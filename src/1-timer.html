<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer · HW-02</title>
    <link rel="stylesheet" href="./css/1-timer.css" />
    <script type="module" src="./js/1-timer.js" defer></script>
  </head>
  <body>
    <div class="page">
      <a class="back-link" href="./">← Back</a>

      <div class="card">
        <h1 class="card-title">Countdown Timer</h1>
        <p class="card-sub">Pick a date and start the countdown</p>

        <div class="calendar-wrapper">
          <input type="text" id="datetime-picker" placeholder="Select date & time" />
          <button type="button" data-start>Start</button>
        </div>

        <div class="timer">
          <div class="field">
            <span class="value" data-days>00</span>
            <span class="label">Days</span>
          </div>
          <div class="sep">:</div>
          <div class="field">
            <span class="value" data-hours>00</span>
            <span class="label">Hours</span>
          </div>
          <div class="sep">:</div>
          <div class="field">
            <span class="value" data-minutes>00</span>
            <span class="label">Minutes</span>
          </div>
          <div class="sep">:</div>
          <div class="field">
            <span class="value" data-seconds>00</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
